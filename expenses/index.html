<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Manager: Smart Counting</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* CSS: Smart Pulse Theme */
        :root {
            --text-main: #f0fdf4;
            --text-muted: #cbd5e1;
            
            /* Glass Variables */
            --glass-bg: rgba(20, 20, 30, 0.25); 
            --glass-border: rgba(255, 255, 255, 0.1);
            
            /* Palette */
            --aurora-green: #39ff14;
            --aurora-purple: #c084fc;
            --aurora-blue: #38bdf8;
            --aurora-red: #ff3b3b;
            
            /* Gradients */
            --login-grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --card-grad: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.02) 100%);
            
            /* Button Gradients */
            --btn-blue-grad: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            --btn-red-grad: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
        }

        * { box-sizing: border-box; user-select: none; }

        body {
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: var(--text-main);
            background-color: #020617;
            overflow-x: hidden;
            cursor: default;
        }

        /* --- BACKGROUND ANIMATION --- */
        .aurora-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -5; background: #020617; overflow: hidden; }
        
        .aurora-light {
            position: absolute; border-radius: 50%; 
            filter: blur(90px); opacity: 0.6;
            animation: auroraWave 25s infinite alternate ease-in-out;
        }
        
        .a1 { top: -30%; left: -20%; width: 120vw; height: 90vh; background: #22c55e; animation-duration: 30s; opacity: 0.25; }
        .a2 { top: -10%; right: -20%; width: 100vw; height: 100vh; background: #a855f7; animation-duration: 35s; opacity: 0.3; }
        .a3 { bottom: -30%; left: -10%; width: 130vw; height: 80vh; background: #0ea5e9; animation-duration: 25s; opacity: 0.25; }

        @keyframes auroraWave {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(40px, 30px) scale(1.1); }
            100% { transform: translate(-30px, -20px) scale(1); }
        }

        .particle-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -4; pointer-events: none; }
        .particle {
            position: absolute; bottom: -10px; background: white; border-radius: 50%;
            box-shadow: 0 0 10px white; opacity: 0; animation: rise 15s infinite linear;
        }
        @keyframes rise {
            0% { transform: translateY(0) scale(0); opacity: 0; }
            20% { opacity: 0.7; }
            80% { opacity: 0.5; }
            100% { transform: translateY(-110vh) scale(1); opacity: 0; }
        }

        /* --- FX CONTAINER --- */
        #fx-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .click-spark {
            position: absolute; width: 10px; height: 10px; background: white; border-radius: 50%;
            box-shadow: 0 0 10px var(--aurora-blue); animation: sparkAnim 0.5s ease-out forwards;
        }
        @keyframes sparkAnim { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }

        .floating-emoji {
            position: absolute; font-size: 2rem;
            animation: floatUp 1.5s ease-out forwards; opacity: 0;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-200px) scale(1.2) rotate(360deg); opacity: 0; }
        }

        /* --- GLASS CARD --- */
        .glass-card {
            background-color: var(--glass-bg);
            backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);
            padding: 40px; border-radius: 24px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            width: 100%; max-width: 450px;
            border: 2px solid transparent; 
            border-top-color: var(--glass-border);
            position: relative; z-index: 10;
            transition: all 0.3s ease;
        }

        /* Border Flash Animations */
        .flash-green { animation: borderFlashGreen 0.6s ease-out; }
        .flash-red { animation: borderFlashRed 0.6s ease-out; }

        @keyframes borderFlashGreen { 0% { border-color: var(--aurora-green); box-shadow: 0 0 30px var(--aurora-green); } 100% { border-color: var(--glass-border); } }
        @keyframes borderFlashRed { 0% { border-color: var(--aurora-red); box-shadow: 0 0 30px var(--aurora-red); } 100% { border-color: var(--glass-border); } }

        /* --- UI TEXT --- */
        h2 { 
            margin: 0 0 5px; text-align: center; font-size: 2.2rem; font-weight: 800; letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, var(--aurora-green));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            cursor: default; transition: 0.3s;
        }
        h2:hover { text-shadow: 0 0 20px rgba(57, 255, 20, 0.6); letter-spacing: 1px; }
        
        .subtitle { 
            display: block; text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 30px; 
            letter-spacing: 2px; text-transform: uppercase; font-weight: 600; cursor: default; transition: 0.4s;
        }
        .subtitle:hover { letter-spacing: 6px; color: var(--aurora-blue); text-shadow: 0 0 10px var(--aurora-blue); }

        .welcome-msg { text-align: center; font-size: 1.1rem; margin-bottom: 25px; }
        .user-highlight { color: var(--aurora-green); font-weight: 700; }

        h3 { margin-top: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; color: #fff; font-size: 1.1rem; transition: 0.3s; cursor: pointer; }
        h3:hover { color: var(--aurora-purple); padding-left: 15px; border-bottom-color: var(--aurora-purple); }

        /* --- BALANCE CARD --- */
        .balance-card {
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255,255,255,0.1);
            padding: 30px; border-radius: 24px; text-align: center; margin-bottom: 25px; 
            position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.4s ease;
        }
        .balance-card:hover { transform: scale(1.02); border-color: var(--aurora-blue); box-shadow: 0 0 30px rgba(0, 201, 255, 0.2); }

        .balance-card h4 { margin: 0; color: #a0a0a0; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
        .balance-card h1 { 
            margin: 10px 0 20px; font-size: 3rem; font-weight: 900; color: #fff; 
            text-shadow: 0 0 15px rgba(255,255,255,0.2); transition: 0.3s;
        }
        .balance-card h1:hover { color: var(--aurora-green); text-shadow: 0 0 30px var(--aurora-green); transform: scale(1.1); }

        .inc-exp-container { display: flex; justify-content: space-between; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 16px; }
        
        .money { font-weight: 700; font-size: 1.1rem; display: block; margin-top: 5px; transition: color 0.3s; }
        .money.plus { color: var(--aurora-green); }
        .money.minus { color: var(--aurora-red); }

        .pop-active { animation: popScale 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popScale { 
            0% { transform: scale(1); } 
            50% { transform: scale(1.5); text-shadow: 0 0 20px white; } 
            100% { transform: scale(1); } 
        }

        /* --- INPUTS --- */
        .form-control { margin-bottom: 20px; position: relative; }
        .form-control label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.9rem; font-weight: 500; transition: 0.3s; }
        .form-control:hover label { color: var(--aurora-green); transform: translateX(5px); }
        
        .input-wrapper { position: relative; }
        .currency-symbol { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--aurora-green); font-weight: 700; z-index: 2; }
        .form-control i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.3); transition: 0.3s; z-index: 2; }
        
        input, select {
            width: 100%; padding: 16px 16px 16px 45px; 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; 
            background-color: rgba(0, 0, 0, 0.3); color: white; 
            font-size: 16px; font-family: 'Outfit', sans-serif; outline: none; transition: all 0.3s;
        }
        select option { background-color: #020617; color: #fff; padding: 10px; }
        input:focus, select:focus { background-color: rgba(255, 255, 255, 0.05); border-color: var(--aurora-green); box-shadow: 0 0 20px rgba(57, 255, 20, 0.2); }
        .input-wrapper:hover i { color: var(--aurora-green); }

        /* --- BUTTONS & ANIMATIONS --- */
        .btn {
            cursor: pointer; color: #fff; border: 0; display: block; font-size: 18px; font-weight: 700; 
            margin: 30px 0 15px; padding: 16px; width: 100%; border-radius: 16px; 
            transition: all 0.3s ease; box-shadow: 0 10px 20px rgba(0,0,0,0.3); position: relative; overflow: hidden;
        }
        .btn-login { background: var(--login-grad); }
        .btn-login:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(168, 85, 247, 0.4); }
        
        /* EXPENSE BUTTON (Reddish) */
        .btn-expense { 
            background: var(--btn-red-grad); 
            box-shadow: 0 10px 20px rgba(255, 65, 108, 0.3);
        }
        .btn-expense:hover { box-shadow: 0 15px 30px rgba(255, 65, 108, 0.5); transform: translateY(-3px); }
        
        /* INCOME BUTTON (Blue) */
        .btn-income { 
            background: var(--btn-blue-grad); 
            box-shadow: 0 10px 20px rgba(0, 114, 255, 0.3);
        }
        .btn-income:hover { box-shadow: 0 15px 30px rgba(0, 114, 255, 0.5); transform: translateY(-3px); }

        .shake-effect { animation: shakeBtn 0.4s ease-in-out; }
        .pulse-effect { animation: pulseBtn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        @keyframes shakeBtn { 
            0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } 
        }
        @keyframes pulseBtn { 
            0% { transform: scale(1); } 50% { transform: scale(1.05); box-shadow: 0 0 20px var(--aurora-blue); } 100% { transform: scale(1); } 
        }

        /* --- LIST --- */
        .list li { 
            background-color: rgba(255, 255, 255, 0.03); 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 18px; margin: 12px 0; border-radius: 16px; 
            border: 1px solid rgba(255,255,255,0.05); transition: all 0.4s ease;
        }
        .list li:hover { transform: translateX(10px) scale(1.02); background-color: rgba(255, 255, 255, 0.08); border-color: var(--aurora-purple); }
        .list li.plus { border-left: 4px solid var(--aurora-green); }
        .list li.minus { border-left: 4px solid var(--aurora-red); }
        .slide-out { animation: slideOutLeft 0.5s forwards; }
        @keyframes slideOutLeft { to { opacity: 0; transform: translateX(-100%); } }
        
        .delete-btn { background: none; border: 0; color: #555; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .delete-btn:hover { color: var(--aurora-red); transform: rotate(90deg) scale(1.2); }

        /* --- TABS --- */
        .auth-tabs { display: flex; justify-content: center; margin-bottom: 25px; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 5px; }
        .auth-tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; color: #888; font-weight: 600; border-radius: 10px; transition: 0.3s; }
        .auth-tab.active { background: var(--login-grad); color: #fff; box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); }

        .btn-logout { 
            background: transparent; border: 2px solid var(--aurora-purple); color: var(--aurora-purple); 
            font-size: 0.9rem; padding: 12px; margin-top: 25px; width: 100%; border-radius: 12px; 
            cursor: pointer; font-weight: 700; transition: 0.3s;
        }
        .btn-logout:hover { background: var(--aurora-purple); color: #fff; box-shadow: 0 0 15px var(--aurora-purple); }

        #auth-message { margin-bottom: 15px; padding: 12px; border-radius: 12px; display: none; font-size: 0.9rem; text-align: center;}
        .error { background: rgba(255, 59, 59, 0.15); color: #ff3b3b; border: 1px solid rgba(255, 59, 59, 0.3); }
        .success { background: rgba(57, 255, 20, 0.15); color: var(--aurora-green); border: 1px solid rgba(57, 255, 20, 0.3); }
        
        #dashboard-screen { display: none; }
        #login-screen { animation: fadeInUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes fadeInUp { from{opacity:0; transform:translateY(30px);} to{opacity:1; transform:translateY(0);} }

    </style>
</head>
<body>
    
    <div class="aurora-container">
        <div class="aurora-light a1"></div>
        <div class="aurora-light a2"></div>
        <div class="aurora-light a3"></div>
        <div class="particle-container" id="particle-box"></div>
    </div>
    <div id="fx-container"></div>

    <div id="auth-screen" class="glass-card">
        <h2>Pocket Manager</h2>
        <span class="subtitle">Secure Vault</span>
        <div class="auth-tabs">
            <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</div>
            <div class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</div>
        </div>
        <div id="auth-message"></div>
        <form id="auth-form">
            <div class="form-control">
                <label>Username</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="Enter ID" autocomplete="username" required>
                </div>
            </div>
            <div class="form-control">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Enter Key" autocomplete="current-password" required>
                </div>
            </div>
            <div style="text-align: left; font-size: 0.9rem; margin-bottom: 15px; color: var(--text-muted);">
                <input type="checkbox" id="remember-me" style="width:auto; margin-right: 8px; vertical-align: middle; cursor:pointer;">
                <label for="remember-me" style="display:inline; cursor: pointer; vertical-align: middle;">Remember me</label>
            </div>
            <button class="btn btn-login" id="auth-btn">Access Account</button>
        </form>
    </div>
    
    <div id="dashboard-screen" class="glass-card" id="main-card">
        <h2>Pocket Manager</h2>
        <span class="subtitle">Smart Tracker</span>
        <div class="welcome-msg">Hi, <span id="display-name" class="user-highlight">User</span> 👋</div>

        <div class="balance-card">
            <h4>Total Balance</h4>
            <h1 id="balance">₹0.00</h1>
            <div class="inc-exp-container">
                <div class="inc-box">
                    <h4>Income</h4>
                    <p id="money-plus" class="money plus">+₹0.00</p>
                </div>
                <div class="exp-box">
                    <h4>Expense</h4>
                    <p id="money-minus" class="money minus">-₹0.00</p>
                </div>
            </div>
        </div>

        <div style="position: relative; height: 220px; width: 100%; margin: 30px 0;">
            <canvas id="expenseChart"></canvas>
        </div>

        <h3 style="color: var(--aurora-blue);">Add Transaction</h3>
        <form id="trans-form">
            <div class="form-control">
                <label>Description</label>
                <div class="input-wrapper">
                    <i class="fas fa-pen"></i>
                    <input type="text" id="text" placeholder="e.g. Coffee" />
                </div>
            </div>
            <div class="form-control">
                <label>Amount (₹)</label>
                <div class="input-wrapper">
                    <span class="currency-symbol">₹</span>
                    <input type="number" id="amount" placeholder="0.00" />
                </div>
            </div>
            <div class="form-control">
                <label>Category</label>
                <select id="category" style="padding-left: 15px;">
                    <option value="Food">🍔 Food & Dining</option>
                    <option value="Transport">🛺 Transport</option>
                    <option value="Groceries">🥦 Groceries</option>
                    <option value="Rent">🏠 Rent / EMI</option>
                    <option value="Bills">⚡ Utilities</option>
                    <option value="Shopping">🛍️ Shopping</option>
                    <option value="Entertainment">🎬 Entertainment</option>
                    <option value="Health">💊 Health</option>
                    <option value="Salary">💰 Salary</option>
                    <option value="Other">📄 Other</option>
                </select>
            </div>
            <div class="form-control">
                <label>Type</label>
                <select id="type" style="padding-left: 15px;">
                    <option value="expense">📉 Expense (-)</option>
                    <option value="income">📈 Income (+)</option>
                </select>
            </div>
            
            <button class="btn btn-expense" id="add-btn">Add Transaction 💸</button>
        </form>

        <h3 style="color: var(--aurora-purple);">History</h3>
        <ul id="list" class="list"></ul>
        <button class="btn-logout" onclick="logout()">Log Out</button>
    </div>

    <script>
        // --- 1. GLOBAL REACTION ---
        window.addEventListener('click', (e) => {
            const el = document.createElement('div');
            el.classList.add('click-spark');
            el.style.left = e.pageX + 'px'; el.style.top = e.pageY + 'px';
            document.body.appendChild(el); setTimeout(() => el.remove(), 500);
        });

        // --- 2. PARTICLES & FX ---
        const particleBox = document.getElementById('particle-box');
        const fxContainer = document.getElementById('fx-container');
        
        function createParticles() {
            for(let i=0; i<20; i++) {
                const el = document.createElement('div');
                el.classList.add('particle');
                const size = Math.random() * 3 + 2; el.style.width = size+'px'; el.style.height = size+'px';
                el.style.left = Math.random()*100+'vw';
                el.style.animationDuration = (Math.random()*10+10)+'s';
                el.style.animationDelay = (Math.random()*5)+'s';
                particleBox.appendChild(el);
            }
        }
        createParticles();

        const categoryEmojis = { 'Food': '🍔', 'Transport': '🛺', 'Groceries': '🥦', 'Rent': '🏠', 'Bills': '⚡', 'Shopping': '🛍️', 'Entertainment': '🎬', 'Health': '💊', 'Salary': '💰', 'Other': '📄' };

        function triggerConfetti(emojiType) {
            for(let i=0; i<12; i++) {
                const el = document.createElement('div');
                el.innerText = emojiType; el.classList.add('floating-emoji');
                const startX = 50 + (Math.random()*20-10); const startY = 70 + (Math.random()*10-5);
                el.style.left = startX+'%'; el.style.top = startY+'%';
                const randX = (Math.random() * 200 - 100) + 'px';
                el.style.setProperty('--randX', randX);
                fxContainer.appendChild(el); setTimeout(() => el.remove(), 1500);
            }
        }

        // --- 3. AUTH LOGIC ---
        const authScreen = document.getElementById('auth-screen');
        const dashboardScreen = document.getElementById('dashboard-screen');
        const authForm = document.getElementById('auth-form');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const authBtn = document.getElementById('auth-btn');
        const authMessage = document.getElementById('auth-message');
        const rememberMeCheck = document.getElementById('remember-me');

        let isRegister = false;

        window.addEventListener('load', () => {
            const rememberedUser = localStorage.getItem('smartSpendRememberedUser');
            if(rememberedUser) {
                usernameInput.value = rememberedUser;
                const storedPass = localStorage.getItem('smartSpendPass');
                if(storedPass) passwordInput.value = storedPass;
            }
            const sessionUser = sessionStorage.getItem('smartSpendSessionUser');
            if(sessionUser) showDashboard(sessionUser);
        });

        function switchTab(mode) {
            isRegister = (mode === 'register');
            document.getElementById('tab-login').classList.toggle('active', !isRegister);
            document.getElementById('tab-register').classList.toggle('active', isRegister);
            authBtn.innerText = isRegister ? "Create Account" : "Access Account";
            authMessage.style.display = 'none';
        }

        authForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const user = usernameInput.value.trim(); const pass = passwordInput.value.trim();
            if(!user || !pass) return;

            if(isRegister) {
                if(localStorage.getItem('smartSpendUser')) showMessage("User exists.", "error");
                else {
                    localStorage.setItem('smartSpendUser', user); localStorage.setItem('smartSpendPass', pass);
                    showMessage("Success! Logging in...", "success"); setTimeout(() => loginSuccess(user), 1000);
                }
            } else {
                const storedUser = localStorage.getItem('smartSpendUser');
                const storedPass = localStorage.getItem('smartSpendPass');
                if(storedUser === user && storedPass === pass) loginSuccess(user);
                else showMessage("Invalid Credentials.", "error");
            }
        });

        function loginSuccess(user) {
            sessionStorage.setItem('smartSpendSessionUser', user);
            if(rememberMeCheck.checked && !isRegister) localStorage.setItem('smartSpendRememberedUser', user);
            showDashboard(user);
        }

        function showMessage(msg, type) {
            authMessage.innerText = msg; authMessage.className = type; authMessage.style.display = 'block';
        }

        function showDashboard(user) {
            document.getElementById('display-name').innerText = user;
            authScreen.style.display = 'none'; dashboardScreen.style.display = 'block';
            if(myChart) myChart.resize();
        }

        function logout() { sessionStorage.removeItem('smartSpendSessionUser'); location.reload(); }

        // --- DASHBOARD LOGIC ---
        const balance = document.getElementById('balance');
        const money_plus = document.getElementById('money-plus');
        const money_minus = document.getElementById('money-minus');
        const list = document.getElementById('list');
        const transForm = document.getElementById('trans-form');
        const text = document.getElementById('text');
        const amount = document.getElementById('amount');
        const category = document.getElementById('category');
        const typeSelect = document.getElementById('type');
        const addBtn = document.getElementById('add-btn');
        const mainCard = document.getElementById('main-card');
        
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
        let myChart = null;

        // --- REACTIVE BUTTON CHANGE ---
        typeSelect.addEventListener('change', (e) => {
            updateButtonState(e.target.value);
        });

        function updateButtonState(type) {
            addBtn.className = 'btn';
            void addBtn.offsetWidth; 
            if(type === 'income') {
                addBtn.classList.add('btn-income', 'pulse-effect');
                mainCard.classList.remove('flash-red');
                mainCard.classList.add('flash-green');
            } else {
                addBtn.classList.add('btn-expense', 'shake-effect');
                mainCard.classList.remove('flash-green');
                mainCard.classList.add('flash-red');
            }
        }

        function formatMoney(num) { return num.toLocaleString('en-IN', { maximumFractionDigits: 2, minimumFractionDigits: 2 }); }

        // SMOOTH COUNTING ANIMATION WITH EASING
        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                // Easing function: Cubic Ease Out
                let progress = Math.min((timestamp - startTimestamp) / duration, 1);
                progress = 1 - Math.pow(1 - progress, 3); 

                const currentVal = start + (end - start) * progress;
                const sign = currentVal < 0 ? '-' : (obj.id === 'balance' ? '' : '+');
                obj.innerText = `${sign}₹${formatMoney(Math.abs(currentVal))}`;
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        function parseCurrency(str) { return parseFloat(str.replace(/[^0-9.-]+/g,"")) || 0; }

        function triggerPop(element) {
            element.classList.remove('pop-active');
            void element.offsetWidth; 
            element.classList.add('pop-active');
        }

        function updateValues() {
            const amounts = transactions.map(t => t.amount);
            const total = amounts.reduce((acc, item) => (acc += item), 0);
            const income = amounts.filter(item => item > 0).reduce((acc, item) => (acc += item), 0);
            const expense = (amounts.filter(item => item < 0).reduce((acc, item) => (acc += item), 0) * -1);

            const oldTotal = parseCurrency(balance.innerText);
            const oldInc = parseCurrency(money_plus.innerText);
            const oldExp = parseCurrency(money_minus.innerText);

            animateValue(balance, oldTotal, total, 1500); // Slower animation for emphasis
            animateValue(money_plus, oldInc, income, 1500);
            animateValue(money_minus, oldExp, expense, 1500);
            
            triggerPop(money_plus);
            triggerPop(money_minus);
            
            updateChart();
        }

        function addTransactionDOM(transaction) {
            const sign = transaction.amount < 0 ? '-' : '+';
            const item = document.createElement('li');
            item.classList.add(transaction.amount < 0 ? 'minus' : 'plus');
            item.id = `trans-${transaction.id}`;
            item.innerHTML = `
                <div><strong>${transaction.text}</strong><span style="font-size:0.8rem; display:block; opacity:0.7">${transaction.category}</span></div>
                <div class="action-btn-container">
                    <span style="font-weight:700; margin-right:10px;">${sign}₹${formatMoney(Math.abs(transaction.amount))}</span>
                    <button class="delete-btn" onclick="removeTransaction(${transaction.id})"><i class="fas fa-trash-alt"></i></button>
                </div>
            `;
            list.prepend(item);
        }

        function addTransaction(e) {
            e.preventDefault();
            if(text.value.trim() === '' || amount.value.trim() === '') return;
            
            const amt = +amount.value;
            const finalAmt = typeSelect.value === 'expense' ? -Math.abs(amt) : Math.abs(amt);
            const cat = category.value;

            // ADD NEW
            const transaction = { id: Math.floor(Math.random()*1000000), text: text.value, amount: finalAmt, category: cat };
            transactions.push(transaction);
            triggerConfetti(categoryEmojis[cat] || '💸');
            
            // SAVE & REFRESH UI
            localStorage.setItem('transactions', JSON.stringify(transactions));
            init(); // Re-renders the list immediately
            updateValues();
            text.value = ''; amount.value = '';
        }

        function removeTransaction(id) {
            const item = document.getElementById(`trans-${id}`);
            if(item) {
                item.classList.add('slide-out');
                item.addEventListener('animationend', () => {
                    transactions = transactions.filter(t => t.id !== id);
                    localStorage.setItem('transactions', JSON.stringify(transactions));
                    init();
                    updateValues();
                });
            }
        }

        function updateChart() {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            const expenses = transactions.filter(t => t.amount < 0);
            const totals = {};
            expenses.forEach(t => { totals[t.category] = (totals[t.category] || 0) + Math.abs(t.amount); });
            
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(totals),
                    datasets: [{
                        data: Object.values(totals),
                        backgroundColor: ['#00c9ff', '#c084fc', '#39ff14', '#ff3b3b', '#fbbf24', '#3b82f6'],
                        borderWidth: 0, hoverOffset: 10
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#fff', font: {family: 'Outfit'} } } } }
            });
        }

        function init() {
            list.innerHTML = '';
            transactions.forEach(addTransactionDOM);
        }

        transForm.addEventListener('submit', addTransaction);
        init();
        updateValues(); // Initial values

    </script>
</body>
</html>
